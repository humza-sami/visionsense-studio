# 15-camera config — Dahua/CP-Plus NVR at 103.83.89.187.
# URL pattern:  rtsp://<user>:<pass>@<host>:554/cam/realmonitor?channel=N&subtype=S
#   password welcome@123 is URL-encoded as welcome%40123 (the %40 is '@').
#
# SUBSTREAM vs MAIN (read PLAN.md §0): subtype=1 is the low-res SUBSTREAM, subtype=0
# is the high-res MAIN stream. This file uses subtype=1 because 15 main streams will
# NOT fit the 8 GB GPU / single NVDEC. If a camera has no substream enabled on the
# NVR, change just that camera's URL to subtype=0 (or enable the substream in the
# NVR's encode settings — recommended).
#
# Per-camera knobs: det_interval (run YOLO every Nth frame), motion_gate (skip static
# frames — NEVER on a theft zone), logic (headcount/desk_activity/theft), zones_file.
# Defaults below are uniform; specialise per camera once you know what each one views.

cameras:
  # ── DEMO camera (always-on, loops a local clip) so the dashboard shows live GPU
  #    detection even while the real RTSP cameras are unreachable. Remove this block
  #    for pure production once the 15 cameras are confirmed working.
  - id: cam-demo
    url: "test_assets/people_h264.mp4"
    det_interval: 2
    motion_gate: false
    logic: [headcount, theft]
    zones_file: null
    enabled: true

  - id: cam01
    url: "rtsp://test:welcome%40123@103.83.89.187:554/cam/realmonitor?channel=1&subtype=1"
    det_interval: 3
    motion_gate: true
    logic: [headcount]
    zones_file: null
    enabled: true

  - id: cam02
