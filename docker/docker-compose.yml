# On-prem deploy: pipeline + redis. Run from repo root:
#   docker compose -f docker/docker-compose.yml up --build
services:
  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: visionsense
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - MODEL_DEVICE=cuda:0
    volumes:
      - ../config:/app/config
      - ../models:/app/models
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
